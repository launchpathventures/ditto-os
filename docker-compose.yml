# Ditto — Docker Compose (local testing of production build)
#
# Usage:
#   docker compose up --build      # Build and start
#   docker compose up -d           # Start in background
#   docker compose down            # Stop
#
# Provenance: Brief 086.

services:
  ditto:
    build: .
    container_name: ditto
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - ditto-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  ditto-data:
    driver: local
