# Ditto — System Process: Project Retrofit
#
# Triggered when a user approves an analyser report + picks runner+tier
# at /projects/:slug/onboarding/confirm (Brief 225/226 → triggers this),
# OR when the user hits the "Re-run retrofit" button at
# /projects/:slug/onboarding (Brief 228), OR when the Self tool
# `rerun_project_retrofit` fires. Walks 4 steps:
#
#   1. generate-plan     — composes a RetrofitPlan from the project's
#                          analyser report + 6 .ditto/ files (role contracts,
#                          skills.json, tools.json, guidance.md,
#                          onboarding-report.md, version.txt + .gitignore).
#                          Computes content hashes; queries prior retrofit
#                          for hashes; marks each file action as
#                          'create' | 'update' | 'unchanged'.
#   2. surface-plan      — writes a NEW workItems row with the
#                          RetrofitPlanBlock (initial status='dispatched'
#                          — dispatch-write reconciles per trust gate).
#   3. dispatch-write    — reads the trust-gate decision from
#                          surface-plan's harness_decisions row; branches:
#                          autonomous → dispatch all files;
#                          spot_checked + sample_pause → block + render
#                          /review/[token];
#                          spot_checked + sample_advance → dispatch all +
#                          mark sampled files;
#                          critical → reject;
#                          supervised → 'pending-review' (Brief 229 ships
#                          per-file approval surface).
#                          When dispatch happens, calls dispatchWorkItem
#                          which routes to the project's runner kind via
#                          Briefs 212/216/217/218 adapters.
#   4. verify-commit     — reads dispatch result from runner_dispatches;
#                          extracts commitSha + actuallyChangedFiles +
#                          skippedFiles from the runner's response;
#                          UPDATES the existing harness_decisions row
#                          (does NOT INSERT a new one) with the planned
#                          file hashes (for next retrofit's user-edit
#                          detection per Q3 resolution).
#
# Trust tier flow: the trigger surface (confirm route, Re-run button, Self
# tool) passes the project's chosen tier via `parentTrustTier` to
# startProcessRun. The harness pipeline's existing
# `parentTrustTier → moreRestrictiveTrust → trustTierOverride` discipline
# (heartbeat.ts:1743-1750) writes processRuns.trustTierOverride; the
# trust-gate handler reads this at every step.
#
# Idempotency + user-edit safety per ADR-043:
# - Re-runs detect 'unchanged' files by hash compare; excluded from dispatch.
# - Autonomous tier: files whose current on-disk hash differs from the
#   prior-run hash are flagged user-touched and skipped (the runner side
#   honours this per the prompt template's "skippedFiles" return shape).
# - Header convention: every Ditto-regenerated file starts with a
#   `# DO NOT EDIT — regenerated by Ditto retrofit (run <processRunId>)`
#   marker for secondary safety beyond hash-compare.
#
# Provenance: Brief 228 §What Changes; Brief 226 project-onboarding.yaml
#   step shape; Insight-180 (stepRunId guard); Insight-212 (idempotency);
#   Insight-217 (multi-step pipelines query step_runs.outputs); ADR-007
#   (trust earning); ADR-043 (.ditto/ Project Substrate).

name: Project Retrofit
id: project-retrofit
version: 1
status: active
system: true

description: >
  Writes Ditto's `.ditto/` substrate into a project's target repo at
  connection time (or on re-run), under the user's chosen runner kind.
  Trust-tier-bound depth: autonomous dispatches silently; spot_checked
  may pause for sample review; critical rejects; supervised renders a
  placeholder until Brief 229 ships the per-file approval surface.

trigger:
  type: event
  event: project.retrofit_requested
  description: >
    Fires when (a) the confirm route at
    /api/v1/projects/:id/onboarding/confirm replaces the Brief 225
    TODO breadcrumb with startProcessRun, (b) the user hits the
    Re-run button on /projects/:slug/onboarding, or (c) the Self tool
    `rerun_project_retrofit` is invoked.

inputs:
  - name: projectId
    type: text
    source: system
    required: true
    description: The project being retrofitted.

steps:
  - id: generate-plan
    name: Generate Retrofit Plan
    executor: script
    description: >
      Composes a RetrofitPlan from the project's analyser report (read from
      the project's onboarding workItems row's `context.analyserReport`)
      plus 6 .ditto/ files. Computes sha256 content hashes; queries the
      most recent prior retrofit's harness_decisions for prior-run hashes;
      marks each file action as 'create' | 'update' | 'unchanged'.
      Pure DB-read + in-memory composition — no clones, no external calls.
    config:
      systemAgent: project-retrofit-generate-plan
    outputs:
      - plan
      - hasAnalyserReport
      - priorRunHashCount

  - id: surface-plan
    name: Surface Retrofit Plan
    executor: script
    description: >
      Writes a NEW workItems row (type='feature', source='system_generated',
      projectId=<project>, briefState='backlog') with the RetrofitPlanBlock
      in `context.retrofitPlan`. Initial status='dispatched' — dispatch-write
      reconciles per the trust-gate decision (deviation from AC #7's literal
      text per Builder handoff). The chat-col surface picks this up.
    config:
      systemAgent: project-retrofit-surface-plan
    outputs:
      - work-item-id
      - retrofit-plan-block

  - id: dispatch-write
    name: Dispatch Retrofit Write
    executor: script
    description: >
      Reads the trust-gate decision via harness_decisions joined to stepRuns
      by stepRunId (NOT step_runs.reviewDetails — that field doesn't exist;
      Builder deviation from AC #7/#8 literal text). Branches per
      trustAction: pause+canAutoAdvance=false → 'rejected' (critical);
      pause → 'pending-review' (supervised); sample_pause →
      'pending-sample-review' (spot_checked); sample_advance → dispatch all
      files + populate sampledFileIds (spot_checked); advance → dispatch all
      (autonomous). When dispatching, composes the runner prompt + payload
      via composeRetrofitPrompt; invokes dispatchWorkItem (which routes via
      the existing Briefs 212/216/217/218 adapters); updates the
      RetrofitPlanBlock + workItem context.
    config:
      systemAgent: project-retrofit-dispatch-write
    outputs:
      - work-item-id
      - retrofit-plan-block
      - dispatched
      - dispatchId
      - runnerKind
      - plannedFileHashes
      - dispatchError

  - id: verify-commit
    name: Verify Commit
    executor: script
    description: >
      Reads the runner_dispatches row by dispatchId; parses the commit SHA
      from `externalRunId` when it's hex-shaped (Builder D2 — the schema
      has no body/responseBody field for the runner's structured
      `{ commitSha, actuallyChangedFiles, skippedFiles }` response, so the
      `actuallyChangedFiles` and `skippedFiles` channels are deferred to a
      future schema-extension brief). UPDATES the existing harness_decisions
      row (written by dispatchWorkItem) with the planned file hashes for
      next retrofit's user-edit detection (Q3 resolution); updates the
      RetrofitPlanBlock with status='committed' + commitSha + commitUrl.
      On failure: status='failed' + reason.
    config:
      systemAgent: project-retrofit-verify-commit
    outputs:
      - work-item-id
      - retrofit-plan-block
      - verified
      - commitSha

outputs:
  - name: plan
    type: data
    destination: system
    description: >
      The RetrofitPlan emitted by generate-plan.
  - name: work-item-id
    type: data
    destination: system
    description: >
      ID of the workItems row that the chat-col surface renders against.
  - name: retrofit-plan-block
    type: data
    destination: system
    description: >
      The fully-populated RetrofitPlanBlock — the same shape stored in
      workItems.context for the Server Component to render.
  - name: dispatched
    type: data
    destination: system
  - name: dispatchId
    type: data
    destination: system
  - name: runnerKind
    type: data
    destination: system
  - name: plannedFileHashes
    type: data
    destination: system
    description: >
      Map of repo-relative path → sha256 content hash. Persisted to
      harness_decisions.reviewDetails by verify-commit so the next retrofit
      can detect user edits.
  - name: dispatchError
    type: data
    destination: system
  - name: verified
    type: data
    destination: system
  - name: commitSha
    type: data
    destination: system

quality_criteria:
  - >
    `dispatch-write` consumes only the unified dispatchWorkItem entry-point —
    no per-runner branching. The four runner kinds reach through Briefs
    212/216/217/218 adapters.
  - >
    Trust-tier-bound depth maps verbatim to ADR-007's TrustAction enum
    (pause | advance | sample_pause | sample_advance) — NO new values
    invented.
  - >
    Re-runs are idempotent: if all files are 'unchanged', dispatch-write
    completes with commitSha=null + AlertBlock side-car; no commit happens.
  - >
    Autonomous-tier user-edit safety honoured per Q3 resolution: the runner
    side compares current on-disk hash to prior-run hash; user-touched files
    are returned in `skippedFiles` and surfaced via
    RetrofitPlanBlock.skippedUserTouchedFiles.
  - >
    `verify-commit` UPDATES the existing harness_decisions row — never
    INSERTs a new one. The planned file hashes are persisted for the next
    retrofit's user-edit detection.

trust:
  # initial_tier=autonomous is intentional (Reviewer CRIT-1 fix). The retrofit
  # is explicitly trust-tier-delegated: the user picks a tier at confirm time
  # (or via the Re-run button / Self tool), and that pick is passed via
  # `parentTrustTier` to startProcessRun. The harness's `moreRestrictiveTrust`
  # discipline (heartbeat.ts:1742-1753) clamps `parentTrustTier` to the more
  # restrictive of `parentTrustTier` and the YAML's `initial_tier` — meaning a
  # restrictive YAML default would silently downgrade a user-picked autonomous
  # tier to supervised. By setting initial_tier=autonomous (the LEAST
  # restrictive), any user-picked tier flows through verbatim. The trust-gate
  # then enforces the user's pick. ADR-043's safety mechanisms (per-file hash
  # compare + the # DO NOT EDIT header convention + critical-tier rejection)
  # catch the missing-parent-tier case (which defaults to supervised in the
  # trigger surfaces). NEVER set this to supervised — it breaks autonomous +
  # spot_checked tier flow end-to-end.
  initial_tier: autonomous
