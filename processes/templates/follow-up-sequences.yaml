# Ditto — Template Process: Follow-Up Sequences
#
# Multi-touch follow-up cadences. Each touch adds value.
# Never "just checking in." Auto-stops on opt-out or fatigue.
#
# Provenance: Brief 079/083, Insight-145 (relationship-first),
# House Value 6 ("No spam, ever"), Insight-153 (three-layer persona)

name: Follow-Up Sequences
id: follow-up-sequences
version: 1
status: active
template: true

operator: user-agent

description: >
  Multi-touch follow-up cadences for prospects who haven't responded
  to initial outreach. Each follow-up adds new value — a relevant
  insight, a case study, a reframe of the value prop. Never "just
  following up" or "bumping this to the top of your inbox." Respects
  fatigue signals and auto-stops. Network-conscious even in persistence.

trigger:
  type: event
  description: >
    Triggered when selling-outreach sends an email and no reply is
    received within the configured wait period (default: 5 days).

inputs:
  - name: originalOutreach
    type: json
    source: self
    required: true
    description: The original outreach message that wasn't replied to
  - name: personId
    type: text
    source: self
    required: true
    description: The prospect to follow up with
  - name: plan
    type: json
    source: self
    required: true
    description: Sales plan for messaging context
  - name: sequenceConfig
    type: json
    source: self
    required: false
    description: >
      Cadence configuration: max touches (default: 3), interval days
      (default: 5-7), value-add strategy (insight, case study, reframe).

steps:
  - id: check-eligibility
    name: Check Eligibility
    executor: rules
    description: >
      Before drafting a follow-up, check:
      - Person hasn't opted out
      - Max touches not exceeded (default: 3 follow-ups after initial)
      - Minimum interval since last contact (5+ days)
      - Person hasn't replied to ANY message (including from other agents)
      - No meeting already booked
      If any check fails, end the sequence gracefully.
    inputs:
      - personId
      - sequenceConfig
    outputs:
      - eligibility-result
    route_to:
      - condition: "eligibility-result.eligible === false"
        goto: end-sequence
    default_next: determine-value-add

  - id: determine-value-add
    name: Determine Value-Add
    executor: ai-agent
    description: >
      Choose what new value to bring in this follow-up:
      - Touch 1: Different angle on the same problem
      - Touch 2: Social proof (case study, testimonial, metric)
      - Touch 3: Direct question or soft close ("Is this the right time?")
      Never repeat the original pitch. Each touch must stand alone
      as a worthwhile email even if they didn't see the original.
      Can consult Alex/Mira: "What do we know about this person
      that could inform the follow-up angle?"
    config:
      model_hint: capable
      person_id: "{personId}"
    inputs:
      - originalOutreach
      - eligibility-result
      - plan
    outputs:
      - value-add-strategy

  - id: draft-follow-up
    name: Draft Follow-Up
    executor: ai-agent
    description: >
      Draft the follow-up in the User Agent's voice:
      - Short (3-5 sentences max)
      - Leads with the new value, not "following up on my last email"
      - Easy to reply to (one clear question or CTA)
      - Includes graceful exit option ("If this isn't relevant, no worries
        — I won't reach out again")
      The last touch in a sequence MUST include the exit option.
    config:
      model_hint: capable
      person_id: "{personId}"
    inputs:
      - value-add-strategy
      - originalOutreach
    outputs:
      - follow-up-draft

  - id: quality-gate
    name: Quality Gate
    executor: rules
    description: >
      Run through the shared quality gate. Additional checks:
      - Not repeating the original pitch
      - Value-add is genuinely new information
      - Contact frequency within limits
      - Final touch includes exit option
    inputs:
      - follow-up-draft
    outputs:
      - approved-draft
    route_to:
      - condition: "approved-draft.passed === false"
        goto: end-sequence
    default_next: send-follow-up

  - id: send-follow-up
    name: Send Follow-Up
    executor: integration
    description: >
      Send as a reply to the original thread (preserves context).
      Record as follow-up interaction with touch number.
    config:
      service: agentmail
    tools:
      - agentmail.reply_to_message
    inputs:
      - approved-draft
    outputs:
      - send-result

  - id: schedule-next
    name: Schedule Next Touch
    executor: rules
    description: >
      If more touches remain in the cadence, schedule the next check.
      If this was the final touch, end the sequence.
      If a reply comes in at any point, cancel remaining touches
      and route to reply-handling.
    inputs:
      - send-result
      - sequenceConfig
    outputs:
      - schedule-result

  - id: end-sequence
    name: End Sequence
    executor: rules
    description: >
      Sequence ended — either all touches exhausted, prospect replied,
      opted out, or quality gate blocked. Record outcome and move
      prospect to appropriate status (nurture, closed-lost, opted-out).
    inputs:
      - eligibility-result
    outputs:
      - sequence-result

outputs:
  - name: sequence-result
    type: json
    description: >
      Sequence outcome: touches sent, replies received, final status
      (replied, exhausted, opted-out, blocked).

quality_criteria:
  - "Every follow-up adds new value — never repeats the original pitch"
  - "Never says 'just following up' or 'bumping this'"
  - "Final touch always includes graceful exit option"
  - "Max 3 follow-ups after initial (4 total touches)"
  - "Minimum 5 days between touches"

feedback:
  metrics:
    - reply_rate_by_touch_number
    - opt_out_rate_from_follow_ups
    - sequence_completion_rate
  capture:
    - user_edits_to_follow_ups
    - which_touch_generated_reply

trust:
  initial_tier: supervised
  upgrade_path:
    - { from: supervised, to: spot_checked, after: "5 complete sequences with <5% opt-out rate" }
  downgrade_triggers:
    - "Opt-out rate exceeds 10% from follow-ups"
    - "User rejects 2+ follow-up drafts in a sequence"
