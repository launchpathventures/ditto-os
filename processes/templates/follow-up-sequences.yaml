# Ditto — Template Process: Follow-Up Sequences
#
# Value-driven follow-ups for prospects who haven't responded.
# Each follow-up adds genuine value — never "just following up."
# Auto-stops on opt-out or fatigue. Network-conscious even in persistence.
#
# Provenance: Brief 079/083, Insight-145 (relationship-first),
# House Value 6 ("No spam, ever"), Insight-153 (three-layer persona)
# Refactored: Brief 130, ADR-027 (cognitive orchestration — thin templates)

name: Follow-Up Sequences
id: follow-up-sequences
version: 2
status: active
template: true
callable_as: sub-process

operator: user-agent

description: >
  Value-driven follow-ups for prospects who haven't responded to initial
  outreach. The agent determines what genuinely adds value for each person
  at each point in time — not a fixed touch sequence. Never "just following
  up" or "bumping this to the top of your inbox." Respects fatigue signals
  and auto-stops. Network-conscious even in persistence.

  Thin template: one cognitive step for value determination + one quality
  gate. No touch numbering — the agent decides what adds value NOW.
  (ADR-027, Insight-172)

trigger:
  type: event
  description: >
    Triggered when selling-outreach sends an email and no reply is
    received within the configured wait period (default: 5 days).

inputs:
  - name: originalOutreach
    type: json
    source: self
    required: true
    description: The original outreach message that wasn't replied to
  - name: personId
    type: text
    source: self
    required: true
    description: The prospect to follow up with
  - name: plan
    type: json
    source: self
    required: true
    description: Sales plan for messaging context
  - name: sequenceConfig
    type: json
    source: self
    required: false
    description: >
      Cadence configuration: max touches (default: 3), interval days
      (default: 5-7), value-add strategy (insight, case study, reframe).

steps:
  # Step 1: Follow up with value — broad cognitive step. The agent checks
  # eligibility and determines what adds value, all in one step.
  - id: follow-up-with-value
    name: "Follow up with value"
    executor: ai-agent
    description: >
      Check eligibility first: not opted out, max touches not exceeded,
      minimum interval since last contact (5+ days), no reply received,
      no meeting already booked. If any check fails, end gracefully.

      If eligible, determine what genuinely adds value for THIS person
      NOW — a new angle, a relevant insight, social proof, a direct
      question. Never repeat the original pitch. Never "just following up."
      Each follow-up must stand alone as a worthwhile email even if they
      didn't see the original.

      Include a graceful exit if this is the final eligible touch:
      "If this isn't relevant, no worries — I won't reach out again."

      Draft the follow-up: short (3-5 sentences max), leads with new
      value, easy to reply to (one clear question or CTA).

      Your selling/connecting mode guides your judgment about angle,
      tone, and whether to send at all.
    config:
      model_hint: capable
      person_id: "{personId}"
    tools:
      - crm.send_email
      - crm.get_interactions
      - web-search
    inputs:
      - originalOutreach
      - plan
      - sequenceConfig
    outputs:
      - follow-up-draft

  # Step 2: Quality gate — non-negotiable, separate from cognitive step.
  # Harness-enforced: if gate fails, sequence ends (no send).
  - id: quality-gate
    name: "Quality Gate"
    executor: rules
    description: >
      Check the staged follow-up draft before sending:
      - Not repeating the original pitch
      - Value-add is genuinely new information
      - Contact frequency within limits
      - Final touch includes exit option
      - Recipient not opted out
      - No spam signals
      If any check fails, end the sequence gracefully — do not send.
    inputs:
      - follow-up-draft
    outputs:
      - approved-draft
    route_to:
      - condition: "approved-draft.passed === false"
        goto: end
    depends_on:
      - follow-up-with-value

outputs:
  - name: sequence-result
    type: json
    description: >
      Sequence outcome: touches sent, replies received, final status
      (replied, exhausted, opted-out, blocked).

quality_criteria:
  - "Every follow-up adds new value — never repeats the original pitch"
  - "Never says 'just following up' or 'bumping this'"
  - "Final touch always includes graceful exit option"
  - "Max 3 follow-ups after initial (4 total touches)"
  - "Minimum 5 days between touches"

feedback:
  metrics:
    - reply_rate_by_touch_number
    - opt_out_rate_from_follow_ups
    - sequence_completion_rate
  capture:
    - user_edits_to_follow_ups
    - which_touch_generated_reply

trust:
  initial_tier: supervised
  upgrade_path:
    - { from: supervised, to: spot_checked, after: "5 complete sequences with <5% opt-out rate" }
  downgrade_triggers:
    - "Opt-out rate exceeds 10% from follow-ups"
    - "User rejects 2+ follow-up drafts in a sequence"
