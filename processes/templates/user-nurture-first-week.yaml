# Ditto — Template Process: User Nurture — First Week
#
# Alex's relationship with the USER after the front door conversation.
# This is NOT prospect follow-ups — this is Alex being a good advisor:
# checking in, sharing progress, asking for feedback, building trust.
#
# KEY PATTERN: Adaptive cadence driven by cognitive judgment, not fixed
# day 2/4/7 schedule. Alex stays in touch when he has something worth
# saying. If the user is engaged, Alex matches their energy. If silent,
# Alex adjusts and eventually gives space.
#
# ALL emails are replies in the same thread started by front-door-intake's
# gather-details step. The user sees ONE conversation, not separate emails.
#
# Provenance: Insight-164 (professional consent model),
# Insight-166 (connection first, commerce follows)
# Refactored: Brief 130, ADR-027 (cognitive orchestration — thin templates)

name: "User Nurture — First Week"
id: user-nurture-first-week
version: 3
status: active
template: true
callable_as: sub-process

operator: alex-or-mira

description: >
  The first week after a user signs up. Alex stays in touch like a real
  advisor — adaptive, not mechanical. Cognitive mode guides when and what
  to say. All emails reply in the same thread. A real advisor has ONE
  conversation with you, not a drip campaign.

  Thin template: one broad cognitive step. Alex's connecting/selling mode
  decides timing, content, and cadence. No fixed schedule — Alex sends
  when he has something worth saying. (ADR-027, Insight-172)

trigger:
  type: process-complete
  description: Triggered when front-door-intake or front-door-cos-intake completes its report-back step

inputs:
  - name: personId
    type: text
    source: self
    required: true
  - name: userId
    type: text
    source: self
    required: true
  - name: email
    type: text
    source: self
    required: true
  - name: name
    type: text
    source: self
    required: false
  - name: detectedMode
    type: text
    source: self
    required: true
    description: "connector, sales, cos, or both"
  - name: conversationSummary
    type: text
    source: self
    required: true
  - name: outreachResults
    type: json
    source: process
    required: false

steps:
  # One broad cognitive step — Alex decides when and what to send.
  - id: nurture-the-relationship
    name: "Nurture the relationship"
    executor: ai-agent
    email_thread: "user-onboarding"
    description: >
      Stay in touch like a real advisor. Use your connecting/selling mode
      to guide your judgment about timing and content.

      Check engagement before sending — if the user replied, respond to
      THEM, don't fire a canned update. If silent, share something
      genuinely useful — or stay quiet. A real advisor knows when silence
      is better than another email.

      Over the course of the week:
      - Share progress when there's something worth reporting
      - Offer insights when you find something genuinely useful
      - Ask for feedback naturally, not as a checklist item
      - If the user engages, match their energy and respond to what they said
      - If silent, don't escalate — give space

      By end of week, summarise what happened and ask for feedback.
      The feedback question is critical — capture the response as
      process memory.

      Your connecting/selling/chief-of-staff mode guides your judgment
      about what to say and when.
    config:
      model_hint: capable
      person_id: "{personId}"
    tools:
      - crm.send_email
      - crm.get_interactions
      - web-search
    inputs:
      - conversationSummary
      - outreachResults
    outputs:
      - user-feedback
      - engagement-level
    wait_for:
      event: reply
      timeout: "7d"

outputs:
  - name: user-feedback
    type: text
    description: Any feedback the user provided during the first week
  - name: engagement-level
    type: text
    description: "active (replied), passive (opened but no reply), silent (no engagement)"

# After first week, transition to regular rhythm.
# The engagement level from this process informs cadence.
chain:
  # If user replied at any point — they're active. Standard weekly rhythm.
  - trigger: engagement-active
    condition: engagement-level == "active"
    process: pipeline-tracking
    inputs:
      personId: "{personId}"
      userId: "{userId}"

  # If user was silent through the entire first week — back off.
  # One more try, then respect the silence.
  - trigger: engagement-silent
    condition: engagement-level == "silent"
    delay: 5d
    process: user-reengagement
    inputs:
      personId: "{personId}"
      userId: "{userId}"
      email: "{email}"
      conversationSummary: "{conversationSummary}"

quality_criteria:
  - "Every email adds value — no 'just checking in'"
  - "All emails in the same thread — ONE conversation"
  - "Silent users get fewer emails, not more"
  - "Engaged users get responses, not canned sequences"
  - "End-of-week summary always sends — it's the guaranteed checkpoint"
  - "Feedback invited and captured"

trust:
  initial_tier: autonomous
  upgrade_path: []
  downgrade_triggers:
    - "User asks Alex to stop emailing"
    - "User marks email as spam"
