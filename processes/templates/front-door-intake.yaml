# Ditto — Template Process: Front Door Intake — Research & Outreach
#
# Alex acts as a professional connector: researches targets, drafts
# introductions, sends outreach using Alex's own identity and credibility.
# User gives consent to the approach during the front door conversation —
# Alex then executes autonomously with quality-gate protection.
#
# Provenance: Brief 105, Insight-164 (professional consent model),
# Insight-160 Context 2 (Alex as Ditto's network professional)

name: "Front Door Intake — Research & Outreach"
id: front-door-intake
version: 2
status: active
template: true
callable_as: sub-process

operator: alex-or-mira

description: >
  Triggered when Alex has gathered enough from a front door conversation to
  start working. Alex researches targets, drafts personalised introductions,
  runs them through a quality gate, sends outreach, and reports back to the
  user on what was done.

  The user gives consent to the approach during the front door conversation.
  Alex then acts as a professional — using Alex's own identity, social
  credibility, and judgment. No per-action approval. Quality gate is the
  safety net. (Insight-164, Insight-160 Context 2)

trigger:
  type: user-event
  description: Alex reaches ACTIVATE in a front door conversation

inputs:
  - name: personId
    type: text
    source: self
    required: true
    description: The person record ID from intake (people.id)
  - name: userId
    type: text
    source: self
    required: true
    description: The network user ID (networkUsers.id) — canonical user identity for interactions and scoping
  - name: email
    type: text
    source: self
    required: true
    description: Visitor's email address
  - name: name
    type: text
    source: self
    required: false
    description: Visitor's name
  - name: need
    type: text
    source: self
    required: true
    description: What the visitor needs (from conversation)
  - name: targetType
    type: text
    source: self
    required: true
    description: Type of people/companies to find (e.g. "property managers in Christchurch")
  - name: businessContext
    type: text
    source: self
    required: false
    description: Business name, website, differentiators, testimonials
  - name: conversationSummary
    type: text
    source: self
    required: true
    description: Full conversation context from front door chat

steps:
  # Step 1: Ask for details — the action email. This is the start of ONE
  # email thread with the user. Everything else replies in this thread.
  - id: gather-details
    name: "Ask for details over email"
    executor: ai-agent
    email_thread: "user-onboarding"
    description: >
      Send the action email asking for their website and positioning details.
      This is the first email in the thread. The user already saw a preview
      of targets in the chat — now we need the details to do proper research.

      [If connector outreachMode] Ask for website and how they want to be
      positioned. Keep it to 2 questions max.
      [If sales outreachMode] Ask for website, one-sentence value prop, and
      tone preferences. Their brand is on the line — we need to get this right.
    config:
      model_hint: fast
      person_id: "{personId}"
    tools:
      - crm.send_email
    inputs:
      - conversationSummary
      - outreachMode
    outputs:
      - gather-email-sent
    # Wait up to 48h for the user to reply with their details.
    # If they reply, their response is available as input to the next step.
    # If they time out, we proceed with what we have from the conversation.
    wait_for:
      event: reply
      timeout: "48h"

  # Step 2: Research — now with the user's website/details (if they replied)
  - id: research-targets
    name: "Research targets"
    executor: ai-agent
    description: >
      Search the web for specific people/companies matching what the visitor
      needs. Build a shortlist of 5-10 targets with names, companies,
      and why they're a good fit.

      If the user replied to gather-details, USE their website and details
      to inform the research. If they timed out, work with what you have
      from the conversation — don't let a non-reply block progress.
    config:
      model_hint: capable
      person_id: "{personId}"
    tools:
      - web-search
      - web-fetch
    inputs:
      - targetType
      - businessContext
    outputs:
      - target-shortlist
    depends_on:
      - gather-details

  # Step 3: Draft introductions
  - id: draft-intros
    name: "Draft introductions"
    executor: ai-agent
    description: >
      Draft personalised introduction messages for each target.
      Match the outreach mode:
      [connector] Use Alex's professional voice — "Hi, I'm Alex from Ditto.
      I work with [company]..." Alex's identity, Alex's credibility.
      [sales] Use the user's company voice — "Hi, I'm reaching out from
      [Company]..." Match the tone the user approved in the front door chat.

      Each intro should feel individually crafted, not templated.
      Frame mutual value for both parties.
    config:
      model_hint: capable
      person_id: "{personId}"
    inputs:
      - target-shortlist
      - businessContext
      - conversationSummary
      - outreachMode
    outputs:
      - draft-messages
    depends_on:
      - research-targets

  # Step 4: Quality gate
  - id: quality-gate
    name: "Pre-Send Quality Gate"
    executor: rules
    description: >
      Check every draft introduction before sending:
      - Recipient not opted out
      - Intro is personalised (references something specific about the recipient)
      - Mutual value framed (not one-sided pitch)
      - Tone matches outreach mode (professional intro vs company voice)
      - No spam signals
    inputs:
      - draft-messages
    outputs:
      - approved-messages
    depends_on:
      - draft-intros

  # Step 5: Send outreach
  - id: send-outreach
    name: "Send outreach"
    executor: ai-agent
    description: >
      Send the approved introductions. Track each send as an interaction.
      Record each contact as a person in the network with initial trust
      level "cold".

      [connector] Send as Alex — Alex's professional identity and credibility.
      [sales] Send as the user's company — match the approved tone.
    config:
      model_hint: fast
      person_id: "{personId}"
    tools:
      - crm.send_email
      - crm.record_interaction
      - crm.create_person
    inputs:
      - approved-messages
      - outreachMode
    outputs:
      - outreach-results
    depends_on:
      - quality-gate

  # Step 6: Report back — in the SAME email thread as gather-details
  - id: report-back
    name: "Report back to user"
    executor: ai-agent
    email_thread: "user-onboarding"
    description: >
      Reply in the existing email thread with a summary of what Alex did:
      who was contacted, how they were positioned, what to expect next.

      For each person contacted, include the actual outreach text:
      "Here's exactly what I sent to [name]:" followed by the full
      quoted draft from the outreach step outputs. The user must be
      able to see every word that was sent on their behalf.

      This is a REPLY, not a new email. The user sees it in the same
      conversation as the action email.

      Invite qualitative feedback: "How did I do? Anyone I should have
      included or excluded?"
    config:
      model_hint: capable
      person_id: "{personId}"
    tools:
      - crm.send_email
    inputs:
      - outreach-results
    outputs:
      - user-briefing
    depends_on:
      - send-outreach

outputs:
  - name: outreach-results
    type: json
    description: Summary of outreach sent — who was contacted, message used, status
  - name: follow-up-schedule
    type: json
    description: Scheduled follow-ups for non-responders

# Process chaining — what happens after this process completes
chain:
  # For each outreach with no reply after 5 days:
  - trigger: no-reply-timeout
    delay: 5d
    process: follow-up-sequences
    inputs:
      originalOutreach: "{outreach-results}"
      personId: "{target.personId}"
      userId: "{userId}"
      plan: "{conversationSummary}"

  # For each positive reply:
  - trigger: positive-reply
    process: connecting-introduction
    inputs:
      personId: "{target.personId}"
      userId: "{userId}"
      context: "{outreach-results}"

  # Weekly pipeline briefing:
  - trigger: schedule
    interval: 7d
    process: pipeline-tracking
    inputs:
      userId: "{userId}"
      personId: "{personId}"

  # Ongoing nurture for all contacts:
  - trigger: schedule
    interval: 14d
    process: network-nurture
    inputs:
      userId: "{userId}"
      personId: "{personId}"

  # User relationship nurture — Alex stays in touch with the USER (not prospects):
  - trigger: step-complete
    step: report-back
    process: user-nurture-first-week
    inputs:
      personId: "{personId}"
      userId: "{userId}"
      email: "{email}"
      name: "{name}"
      detectedMode: "connector"
      conversationSummary: "{conversationSummary}"
      outreachResults: "{outreach-results}"

  # Brief 126: When detectedMode was "both", chain to CoS intake after outreach
  # report-back. This gives the user ONE email thread, not two parallel ones.
  # The CoS intake starts AFTER outreach is underway.
  - trigger: step-complete
    step: report-back
    condition: detectedMode == "both"
    process: front-door-cos-intake
    inputs:
      personId: "{personId}"
      userId: "{userId}"
      email: "{email}"
      name: "{name}"
      conversationSummary: "{conversationSummary}"

quality_criteria:
  - "User gave consent to approach during front-door conversation"
  - "Targets are real, verifiable companies/people"
  - "Introductions are personalised, not templated"
  - "Quality gate passed on every outreach before send"
  - "User received clear report-back on what was done and what's next"
  - "Report-back invites qualitative feedback"

feedback:
  metrics:
    - response_rate
    - positive_response_rate
    - user_satisfaction
    - report_back_feedback_captured
  capture:
    - target_quality
    - intro_quality
    - follow_up_effectiveness
    - user_report_back_responses

trust:
  # Context 2: Alex as Ditto's network professional (Insight-160, Insight-164)
  # Reclassified from Context 3 (on behalf of user's business) because Alex
  # acts using Alex's own professional identity, not the user's brand.
  # Quality-gate (critical tier) is the safety net.
  initial_tier: autonomous
  upgrade_path: []
  downgrade_triggers:
    - "User says Alex contacted someone they shouldn't have"
    - "Outreach gets reported as spam"
    - "Response rate drops below 5% over 3 consecutive cycles"
