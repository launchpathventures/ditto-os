# Ditto — Template Process: Front Door Intake — Research & Outreach
#
# Alex acts as a professional connector: researches targets, drafts
# introductions, sends outreach using Alex's own identity and credibility.
# User gives consent to the approach during the front door conversation —
# Alex then executes autonomously with quality-gate protection.
#
# Provenance: Brief 105, Insight-164 (professional consent model),
# Insight-160 Context 2 (Alex as Ditto's network professional)
# Refactored: Brief 130, ADR-027 (cognitive orchestration — thin templates)

name: "Front Door Intake — Research & Outreach"
id: front-door-intake
version: 3
status: active
template: true
callable_as: sub-process

operator: alex-or-mira

description: >
  Triggered when Alex has gathered enough from a front door conversation to
  start working. Alex uses cognitive judgment to research targets, draft and
  send personalised introductions, then reports back to the user.

  The user gives consent to the approach during the front door conversation.
  Alex then acts as a professional — using Alex's own identity, social
  credibility, and judgment. No per-action approval. Quality gate is the
  safety net. (Insight-164, Insight-160 Context 2)

  Thin template: declares capabilities and gates, not step sequences.
  Alex's connecting/selling mode guides what to do and in what order.
  (ADR-027, Insight-172)

trigger:
  type: user-event
  description: Alex reaches ACTIVATE in a front door conversation

inputs:
  - name: personId
    type: text
    source: self
    required: true
    description: The person record ID from intake (people.id)
  - name: userId
    type: text
    source: self
    required: true
    description: The network user ID (networkUsers.id) — canonical user identity for interactions and scoping
  - name: email
    type: text
    source: self
    required: true
    description: Visitor's email address
  - name: name
    type: text
    source: self
    required: false
    description: Visitor's name
  - name: need
    type: text
    source: self
    required: true
    description: What the visitor needs (from conversation)
  - name: targetType
    type: text
    source: self
    required: true
    description: Type of people/companies to find (e.g. "property managers in Christchurch")
  - name: businessContext
    type: text
    source: self
    required: false
    description: Business name, website, differentiators, testimonials
  - name: conversationSummary
    type: text
    source: self
    required: true
    description: Full conversation context from front door chat

steps:
  # Step 1: Work the lead — broad cognitive step. Alex decides what to do
  # first based on context: ask for details, research, draft, send.
  # Cognitive mode (connecting/selling) guides judgment.
  - id: work-the-lead
    name: "Work the lead"
    executor: ai-agent
    email_thread: "user-onboarding"
    description: >
      Use your connecting/selling mode to research targets, draft
      introductions, and prepare outreach. Decide what to do first based
      on context. If the user replied with their website, use it. If not,
      work with what you have.

      You have access to web search, web fetch, email sending, interaction
      recording, and person creation. Exercise judgment about sequence and
      timing — research when it makes sense, draft when you have enough,
      send when the quality is right.

      Start by emailing the user to ask for their website and positioning
      details (this begins the user-onboarding email thread). Wait up to
      48h for a reply, then proceed with whatever you have.
    config:
      model_hint: capable
      person_id: "{personId}"
    tools:
      - web-search
      - web-fetch
      - crm.send_email
      - crm.record_interaction
      - crm.create_person
    inputs:
      - conversationSummary
      - targetType
      - businessContext
      - outreachMode
    outputs:
      - outreach-results
    wait_for:
      event: reply
      timeout: "48h"

  # Step 2: Quality gate — non-negotiable, separate from cognitive step.
  # Checks every staged draft before dispatch.
  - id: quality-gate
    name: "Pre-Send Quality Gate"
    executor: rules
    description: >
      Check every draft introduction before sending:
      - Recipient not opted out
      - Intro is personalised (references something specific about the recipient)
      - Mutual value framed (not one-sided pitch)
      - Tone matches outreach mode (professional intro vs company voice)
      - No spam signals
    inputs:
      - outreach-results
    outputs:
      - approved-messages
    depends_on:
      - work-the-lead

  # Step 3: Report back — in the SAME email thread as the initial email.
  - id: report-back
    name: "Report back to user"
    executor: ai-agent
    email_thread: "user-onboarding"
    description: >
      Reply in the existing email thread with a summary of what Alex did:
      who was contacted, how they were positioned, what to expect next.

      For each person contacted, include the actual outreach text:
      "Here's exactly what I sent to [name]:" followed by the full
      quoted draft from the outreach step outputs. The user must be
      able to see every word that was sent on their behalf.

      This is a REPLY, not a new email. The user sees it in the same
      conversation as the action email.

      Invite qualitative feedback: "How did I do? Anyone I should have
      included or excluded?"
    config:
      model_hint: capable
      person_id: "{personId}"
    tools:
      - crm.send_email
    inputs:
      - approved-messages
      - outreach-results
    outputs:
      - user-briefing
    depends_on:
      - quality-gate

outputs:
  - name: outreach-results
    type: json
    description: Summary of outreach sent — who was contacted, message used, status
  - name: follow-up-schedule
    type: json
    description: Scheduled follow-ups for non-responders

# Process chaining — what happens after this process completes
chain:
  # For each outreach with no reply after 5 days:
  - trigger: no-reply-timeout
    delay: 5d
    process: follow-up-sequences
    inputs:
      originalOutreach: "{outreach-results}"
      personId: "{target.personId}"
      userId: "{userId}"
      plan: "{conversationSummary}"

  # For each positive reply:
  - trigger: positive-reply
    process: connecting-introduction
    inputs:
      personId: "{target.personId}"
      userId: "{userId}"
      context: "{outreach-results}"

  # Weekly pipeline briefing:
  - trigger: schedule
    interval: 7d
    process: pipeline-tracking
    inputs:
      userId: "{userId}"
      personId: "{personId}"

  # Ongoing nurture for all contacts:
  - trigger: schedule
    interval: 14d
    process: network-nurture
    inputs:
      userId: "{userId}"
      personId: "{personId}"

  # User relationship nurture — Alex stays in touch with the USER (not prospects):
  - trigger: step-complete
    step: report-back
    process: user-nurture-first-week
    inputs:
      personId: "{personId}"
      userId: "{userId}"
      email: "{email}"
      name: "{name}"
      detectedMode: "connector"
      conversationSummary: "{conversationSummary}"
      outreachResults: "{outreach-results}"

  # Brief 126: When detectedMode was "both", chain to CoS intake after outreach
  # report-back. This gives the user ONE email thread, not two parallel ones.
  # The CoS intake starts AFTER outreach is underway.
  - trigger: step-complete
    step: report-back
    condition: detectedMode == "both"
    process: front-door-cos-intake
    inputs:
      personId: "{personId}"
      userId: "{userId}"
      email: "{email}"
      name: "{name}"
      conversationSummary: "{conversationSummary}"

quality_criteria:
  - "User gave consent to approach during front-door conversation"
  - "Targets are real, verifiable companies/people"
  - "Introductions are personalised, not templated"
  - "Quality gate passed on every outreach before send"
  - "User received clear report-back on what was done and what's next"
  - "Report-back invites qualitative feedback"

feedback:
  metrics:
    - response_rate
    - positive_response_rate
    - user_satisfaction
    - report_back_feedback_captured
  capture:
    - target_quality
    - intro_quality
    - follow_up_effectiveness
    - user_report_back_responses

trust:
  # Context 2: Alex as Ditto's network professional (Insight-160, Insight-164)
  # Reclassified from Context 3 (on behalf of user's business) because Alex
  # acts using Alex's own professional identity, not the user's brand.
  # Quality-gate (critical tier) is the safety net.
  initial_tier: autonomous
  upgrade_path: []
  downgrade_triggers:
    - "User says Alex contacted someone they shouldn't have"
    - "Outreach gets reported as spam"
    - "Response rate drops below 5% over 3 consecutive cycles"
