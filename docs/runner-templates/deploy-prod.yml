      #   with:
      #     production-deploy: true
      #     publish-dir: ./dist
      #   env:
      #     NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      #     NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      # ---------------------------------------------------------------------
      # OPTION C: Cloudflare Pages — uncomment + remove Option A above
      # ---------------------------------------------------------------------
      # Required secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
      # - uses: actions/setup-node@v4
      #   with: { node-version: 20 }
      # - run: npm ci && npm run build
      # - uses: cloudflare/wrangler-action@v3
      #   id: deploy
      #   with:
      #     apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      #     accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      #     command: pages deploy ./dist --project-name=<YOUR-PROJECT>

      # ---------------------------------------------------------------------
      # OPTION D: Fly.io — uncomment + remove Option A above
      # ---------------------------------------------------------------------
      # Required secrets: FLY_API_TOKEN
      # - uses: superfly/flyctl-actions/setup-flyctl@master
      # - id: deploy
      #   run: |
      #     flyctl deploy --remote-only
      #     APP_NAME=$(flyctl status --json | jq -r .Name)
      #     echo "deploy_url=https://${APP_NAME}.fly.dev" >> "$GITHUB_OUTPUT"
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
