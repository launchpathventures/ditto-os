name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: pnpm test:e2e
        env:
          CI: true
          MOCK_LLM: "true"
          NODE_ENV: test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      # Note: test:e2e:auto (expect-cli) is NOT run in CI.
      # It requires Claude Code as an ACP agent backend, which
      # needs auth configuration in the CI environment.
      # Add as a separate CI job when agent auth in CI is solved.
