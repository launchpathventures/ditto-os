# GitHub Integration
#
# Provides access to GitHub repositories, issues, PRs, and actions
# via the GitHub CLI (gh). CLI is the preferred protocol — cheapest
# and most reliable for services with mature CLIs.
#
# Provenance: ADR-005 (CLI-first cost optimisation, 10-32x fewer tokens than MCP)

service: github
description: GitHub repository management — issues, PRs, actions, releases
interfaces:
  cli:
    command: gh
    auth: cli_login    # Uses `gh auth login` or GH_TOKEN env var. Vault-backed auth (Brief 035): env var fallback preserved.
    env_vars:
      - GH_TOKEN       # Optional — gh CLI falls back to interactive auth
preferred: cli
connection:
  auth_type: api_key
  provider_name: GitHub
  setup_url: https://github.com/settings/tokens
  setup_instructions: "Create a personal access token at GitHub Settings → Developer settings → Personal access tokens. Select the scopes you need (repo, issues, pull requests)."

tools:
  - name: search_issues
    description: Search issues in a GitHub repository. Returns JSON with issue number, title, body, state, and labels.
    parameters:
      repo:
        type: string
        required: true
        description: "Repository in owner/repo format"
      query:
        type: string
        description: "Search query string"
      state:
        type: string
        description: "Filter by state: open, closed, all"
    execute:
      protocol: cli
      command_template: "gh issue list --repo {repo} --json number,title,body,state,labels --limit 20"
      args:
        query: "--search '{query}'"
        state: "--state {state}"

  - name: list_prs
    description: List pull requests in a GitHub repository. Returns JSON with PR number, title, state, author, and URL.
    parameters:
      repo:
        type: string
        required: true
        description: "Repository in owner/repo format"
      state:
        type: string
        description: "Filter by state: open, closed, merged, all"
    execute:
      protocol: cli
      command_template: "gh pr list --repo {repo} --json number,title,state,author,url --limit 20"
      args:
        state: "--state {state}"

  - name: get_issue
    description: Get details of a specific GitHub issue by number. Returns JSON with full issue details.
    parameters:
      repo:
        type: string
        required: true
        description: "Repository in owner/repo format"
      number:
        type: string
        required: true
        description: "Issue number"
    execute:
      protocol: cli
      command_template: "gh issue view {number} --repo {repo} --json number,title,body,state,labels,assignees,comments"

  - name: create_issue
    description: Create a new issue in a GitHub repository.
    parameters:
      repo:
        type: string
        required: true
        description: "Repository in owner/repo format"
      title:
        type: string
        required: true
        description: "Issue title"
      body:
        type: string
        description: "Issue body (markdown)"
    execute:
      protocol: cli
      command_template: "gh issue create --repo {repo} --title '{title}'"
      args:
        body: "--body '{body}'"
