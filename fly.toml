# fly.toml app configuration file generated for ditto-network on 2026-04-06
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'ditto-network'
primary_region = 'syd'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOSTNAME = "0.0.0.0"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "ditto_data"
  destination = "/app/data"

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
